# Logstash 配置文件
# 用于接收 Filebeat 日志，解析处理后发送到 Elasticsearch

input {
  beats {
    port => 5044
    ssl => false
  }
}

filter {
  # JSON 日志解析
  if "huochai" in [tags] {
    # 解析时间戳
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
      target => "@timestamp"
      timezone => "Asia/Shanghai"
    }
    
    # 解析日志类型
    if [logType] {
      mutate {
        add_field => { "log_type" => "%{logType}" }
      }
    }
    
    # 解析 HTTP 请求日志
    if [logType] == "CONTROLLER" {
      mutate {
        add_field => {
          "request_path" => "%{path}"
          "request_method" => "%{httpMethod}"
          "response_status" => "%{responseStatus}"
        }
      }
      
      # 提取请求耗时
      if [duration] {
        mutate {
          convert => { "duration" => "integer" }
        }
      }
    }
    
    # 解析 SQL 日志
    if [logType] == "MYSQL" {
      mutate {
        add_field => { "sql_statement" => "%{sql}" }
      }
      
      if [duration] {
        mutate {
          convert => { "duration" => "integer" }
        }
      }
      
      # 标记慢查询
      if [duration] and [duration] > 1000 {
        mutate {
          add_tag => ["slow_query"]
        }
      }
    }
    
    # 解析 Redis 日志
    if [logType] == "REDIS" {
      mutate {
        add_field => { "redis_command" => "%{command}" }
      }
    }
    
    # 解析 MQ 日志
    if [logType] in ["MQ_CONSUMER", "MQ_PRODUCER"] {
      mutate {
        add_field => {
          "mq_queue" => "%{queue}"
          "mq_exchange" => "%{exchange}"
        }
      }
    }
    
    # 解析 Dubbo RPC 日志
    if [logType] == "DUBBO" {
      mutate {
        add_field => {
          "dubbo_service" => "%{serviceInterface}"
          "dubbo_method" => "%{methodName}"
          "dubbo_side" => "%{side}"
        }
      }
    }
    
    # 异常日志处理
    if [logType] == "EXCEPTION" or [level] == "ERROR" {
      mutate {
        add_tag => ["error"]
      }
    }
    
    # 移除不必要的字段
    mutate {
      remove_field => ["@version", "host", "agent", "ecs", "input", "log"]
    }
    
    # GeoIP 处理（如果有客户端IP）
    if [clientIp] {
      geoip {
        source => "clientIp"
        target => "geoip"
      }
    }
  }
}

output {
  # 按日志类型输出到不同索引
  if [logType] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "huochai-%{[logType],lowercase}-%{+YYYY.MM.dd}"
      # 无认证配置
      # 如需认证，取消注释以下配置
      # user => "elastic"
      # password => "${ELASTIC_PASSWORD}"
    }
  } else {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "huochai-other-%{+YYYY.MM.dd}"
    }
  }
  
  # 调试输出（生产环境可关闭）
  # stdout { codec => rubydebug }
}