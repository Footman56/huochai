# Filebeat 配置文件
# 用于采集 Spring Boot 应用日志并发送到 Logstash

filebeat.inputs:
  # 采集 JSON 格式的应用日志
  - type: log
    enabled: true
    paths:
      - /var/log/huochai/*.json
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: message
    # 多行日志合并（针对异常堆栈）
    multiline.pattern: '^\{'
    multiline.negate: true
    multiline.match: after
    # 添加标签
    tags: ["huochai", "spring-boot"]
    # 添加字段
    fields:
      app: huochai
      env: ${ENV:dev}
    fields_under_root: true

  # 采集普通文本日志
  - type: log
    enabled: true
    paths:
      - /var/log/huochai/*.log
    # 多行日志合并（针对异常堆栈）
    multiline.pattern: '^\d{4}-\d{2}-\d{2}'
    multiline.negate: true
    multiline.match: after
    tags: ["huochai", "spring-boot", "text"]
    fields:
      app: huochai
      env: ${ENV:dev}
    fields_under_root: true

# 输出到 Logstash
output.logstash:
  enabled: true
  hosts: ["logstash:5044"]
  bulk_max_size: 2048
  loadbalance: true

# 备用：直接输出到 Elasticsearch（不推荐生产使用）
# output.elasticsearch:
#   hosts: ["elasticsearch:9200"]
#   index: "huochai-log-%{+yyyy.MM.dd}"

# 监控配置
monitoring.enabled: false

# 日志配置
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7

# 处理器配置
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~