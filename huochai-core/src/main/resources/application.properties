# 应用服务 WEB 访问端口
server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=Asdf1234
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=huochai

# Tomcat SSL 配置
server.tomcat.redirect-context-root=true
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.http.port=8080

# ========== MySQL 数据源配置 ==========
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/huochai?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=huochai
spring.datasource.password=Asdf1234

# ========== Redis 配置 ==========
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.client-name=huochai
spring.data.redis.password=Asdf1234
spring.data.redis.database=0
spring.data.redis.timeout=10000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ========== MyBatis-Plus 配置 ==========
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.huochai.auth.domain.model,com.huochai.permission.domain.model
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# ========== JWT 配置 ==========
jwt.secret=huochai-jwt-secret-key-must-be-at-least-256-bits-long-for-security-2024
jwt.access-token-expire=7200000
jwt.refresh-token-expire=604800000
jwt.issuer=huochai-auth

# ========== 日志配置 ==========
logging.level.root=INFO
logging.level.com.huochai=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId}] [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/huochai-auth.log
logging.file.max-size=100MB
logging.file.max-history=30

# ========== OAuth2 Authorization Server 配置 ==========
# 授权服务器 Issuer
oauth2.server.issuer=https://localhost:8443
# Access Token 有效期（秒）
oauth2.server.access-token-ttl=7200
# Refresh Token 有效期（秒）
oauth2.server.refresh-token-ttl=604800
# 是否需要授权同意页面
oauth2.server.require-authorization-consent=true

# ========== OAuth2 客户端配置 ==========
# Web 客户端
oauth2.client.web-app.client-id=web-app
oauth2.client.web-app.client-secret=secret
oauth2.client.web-app.redirect-uri=https://localhost:8443/login/oauth2/code/web-app

# 移动端客户端
oauth2.client.mobile-app.client-id=mobile-app
oauth2.client.mobile-app.client-secret=secret
oauth2.client.mobile-app.redirect-uri=myapp://callback

# 服务间调用客户端
oauth2.client.service-client.client-id=service-client
oauth2.client.service-client.client-secret=secret