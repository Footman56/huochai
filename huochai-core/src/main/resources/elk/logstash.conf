# Logstash 配置文件
# 接收 Filebeat 日志，处理后输出到 Elasticsearch

input {
  # 从 Filebeat 接收日志
  beats {
    port => 5044
    ssl => false
  }

  # HTTP 输入（可选，用于直接接收日志）
  http {
    port => 8080
    ssl => false
  }
}

filter {
  # 解析 JSON 格式日志
  if [log_type] == "application" {
    json {
      source => "message"
      target => "parsed"
    }

    # 提取时间戳
    date {
      match => ["@timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
      target => "@timestamp"
      timezone => "Asia/Shanghai"
    }
  }

  # 解析认证日志
  if [log_type] == "auth" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:traceId}\] \[%{DATA:thread}\] %{LOGLEVEL:level} %{DATA:logger} - %{GREEDYDATA:log_message}"
      }
      overwrite => ["message"]
    }

    # 提取领域行为标记
    if [log_message] =~ /\[领域行为\]/ {
      mutate {
        add_tag => ["domain_action"]
      }
    }

    # 提取领域验证标记
    if [log_message] =~ /\[领域验证\]/ {
      mutate {
        add_tag => ["domain_validation"]
      }
    }

    # 提取服务标记
    if [log_message] =~ /\[认证服务\]|\[Token服务\]|\[权限服务\]/ {
      mutate {
        add_tag => ["domain_service"]
      }
    }

    # 提取用户ID
    grok {
      match => {
        "log_message" => "userId=%{NUMBER:userId}"
      }
    }

    # 提取用户名
    grok {
      match => {
        "log_message" => "username=%{WORD:username}"
      }
    }
  }

  # 提取 TraceId
  if [traceId] {
    mutate {
      add_field => { "trace.id" => "%{traceId}" }
    }
  }

  # 转换日志级别为小写
  mutate {
    lowercase => ["level"]
  }

  # 添加处理时间戳
  mutate {
    add_field => { "processed_at" => "%{+YYYY-MM-dd HH:mm:ss}" }
  }

  # 移除不需要的字段
  mutate {
    remove_field => ["host", "agent", "ecs", "input", "log"]
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "huochai-auth-%{+YYYY.MM.dd}"
    # 用户名密码（如果需要）
    # user => "elastic"
    # password => "changeme"
    
    # 索引模板
    template_name => "huochai-auth"
    template_overwrite => true
  }

  # 调试输出到控制台
  # stdout {
  #   codec => rubydebug
  # }
}

# ==================== 性能配置 ====================
pipeline {
  workers => 4
  batch_size => 125
  batch_delay => 50
}